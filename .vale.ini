StylesPath = styles

MinAlertLevel = suggestion

Packages = RedHat, proselint, write-good

Vocab = WineCellar

[*.{md}]
BasedOnStyles = Vale, RedHat, proselint, write-good
# Skip snake_case identifiers (DB columns, API fields, table names)
TokenIgnores = \b[A-Za-z]+(_[a-z]+)+\b
# E-Prime ("avoid is/are/was") is a creative writing philosophy, not a technical writing standard
write-good.E-Prime = NO

